<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Confirm your email</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f6f8;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f4f6f8;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:520px;background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(43,50,64,0.08);">
          <tr>
            <td style="padding:32px 32px 8px 32px;text-align:center;">
              <div style="font-family:Georgia,'Times New Roman',serif;font-size:26px;font-weight:600;color:#2B3240;">OrderlyFlow</div>
              <p style="margin:16px 0 0 0;font-size:15px;line-height:1.6;color:#5a6472;">Confirm your email to finish setting up your account.</p>
            </td>
          </tr>
          <tr>
            <td style="padding:8px 32px 32px 32px;text-align:center;">
              <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#5B8FA8;color:#ffffff;text-decoration:none;font-weight:600;font-size:15px;padding:14px 28px;border-radius:8px;">Confirm email</a>
              <p style="margin:24px 0 0 0;font-size:13px;line-height:1.5;color:#8a94a3;">If you did not create an account, you can ignore this message.</p>
            </td>
          </tr>
        </table>
        <p style="margin:24px 0 0 0;font-size:12px;color:#9aa3ad;">&copy; OrderlyFlow</p>
      </td>
    </tr>
  </table>
</body>
</html>
